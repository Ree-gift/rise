<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Rise - Bounce Back from Job Rejection</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f9fafb; }
    .loader { text-align: center; }
    .spinner { width: 40px; height: 40px; border: 3px solid #e5e7eb; border-top-color: #0ea5e9; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>
  <script>
    (function() {
      var base = '/rise';
      var path = window.location.pathname.replace(base, '') || '/';
      if (path.endsWith('/')) path = path.slice(0, -1);
      if (path === '' || path === '/') {
        window.location.replace(base + '/');
      } else {
        var page = path.split('/')[1];
        var validPages = ['dashboard', 'track', 'motivation', 'optimize', 'community', 'resume'];
        if (validPages.indexOf(page) !== -1) {
          window.location.replace(base + '/' + page + '/index.html?v=' + Date.now());
        } else {
          window.location.replace(base + '/');
        }
      }
    })();
  </script>
</body>
</html>
